definitions:
  router.BlocksInfo:
    properties:
      block:
        description: Block Block 名称
        example: UMC
        type: string
      ce:
        description: CE Correctable Error 数量
        example: 0
        type: integer
      state:
        description: State Block 状态
        example: OK
        type: string
      ue:
        description: UE Uncorrectable Error 数量
        example: 0
        type: integer
    type: object
  router.BusInfoResp:
    properties:
      picId:
        description: PicID 设备总线ID
        type: string
    type: object
  router.ClockOverDriveResp:
    properties:
      failedMessages:
        description: FailedMessages 包含操作失败的设备及其错误信息
        items:
          $ref: '#/definitions/router.FailedMessage'
        type: array
    type: object
  router.CreateVDevicesResp:
    properties:
      vdevIDs:
        description: VDevIDs 创建成功的虚拟设备ID集合
        items:
          type: integer
        type: array
    type: object
  router.DCUResult:
    properties:
      dcu:
        description: DCU DCU 编号
        example: 0
        type: integer
      diagResults:
        description: DiagResults DCU 下的诊断结果列表
        items:
          $ref: '#/definitions/router.DiagResult'
        type: array
      rc:
        description: RC 返回码
        example: 0
        type: integer
    type: object
  router.DCUUseResp:
    properties:
      gpuUsage:
        description: GPUUsage DCU 当前使用百分比
        type: integer
    type: object
  router.DFBandwidthInfo:
    properties:
      readBW:
        description: ReadBW DF 读带宽
        type: number
      readWriteBW:
        description: ReadWriteBW DF 读写带宽
        type: number
      writeBW:
        description: WriteBW DF 写带宽
        type: number
    type: object
  router.DFBandwidthResp:
    properties:
      dfBandwidthInfo:
        allOf:
        - $ref: '#/definitions/router.DFBandwidthInfo'
        description: DFBandwidthInfo DF 带宽信息
    type: object
  router.DMIDeviceInfo:
    description: 单个物理设备的详细信息
    properties:
      computeUnitCount:
        description: |-
          ComputeUnitCount 计算单元总数
          @example 64
        type: integer
      computeUnitRemainingCount:
        description: |-
          ComputeUnitRemainingCount 剩余计算单元数
          @swagignore
        format: int64
        type: integer
      deviceID:
        description: |-
          DeviceID 设备索引号
          @example 0
        type: integer
      globalMemSize:
        description: |-
          GlobalMemSize 全局内存大小
          @swagignore
        format: int64
        type: integer
      maxVDeviceCount:
        description: |-
          MaxVDeviceCount 最大虚拟设备数量
          @example 8
        type: integer
      memoryRemaining:
        description: |-
          MemoryRemaining 剩余内存
          @swagignore
        format: int64
        type: integer
      name:
        description: |-
          Name 设备名称
          @example DCU-0
        type: string
      percent:
        description: |-
          Percent 使用率（百分比）
          @example 75
        type: integer
      usageMemSize:
        description: |-
          UsageMemSize 已使用内存大小
          @swagignore
        format: int64
        type: integer
    type: object
  router.DMIVDeviceInfo:
    properties:
      computeUnitCount:
        description: 虚拟设备计算单元数量
        type: integer
      containerID:
        description: 所属容器ID
        type: integer
      deviceID:
        description: 设备ID
        type: integer
      globalMemSize:
        description: 全局内存大小（MB） @swagignore
        type: integer
      name:
        description: 虚拟设备名称
        type: string
      pciBusNumber:
        description: 虚拟设备总线编号
        type: string
      percent:
        description: 使用百分比
        type: integer
      usageMemSize:
        description: 已使用内存大小（MB） @swagignore
        type: integer
      vminorNumber:
        description: 虚拟设备索引号
        type: integer
    type: object
  router.DevBrandResp:
    properties:
      brand:
        description: Brand 设备品牌名称
        type: string
    type: object
  router.DevGpuClkFreqSetResp:
    properties:
      message:
        description: Message 提示信息
        type: string
    type: object
  router.DevNameResp:
    properties:
      deviceName:
        type: string
    type: object
  router.DevPciBandwidthResp:
    properties:
      PcieBandwidth:
        allOf:
        - $ref: '#/definitions/router.PcieBandwidth'
        description: RsmiPcieBandwidth PCIe 带宽信息
    type: object
  router.DevSkuResp:
    properties:
      sku:
        description: Sku 设备 SKU
        type: integer
    type: object
  router.DevSubsystemIdResp:
    properties:
      subsystemId:
        description: SubsystemId 子系统 ID
        type: string
    type: object
  router.DevSubsystemNameResp:
    properties:
      subsystemName:
        description: SubsystemName 子系统名称
        type: string
    type: object
  router.DevTypeIDResp:
    properties:
      id:
        description: ID 设备ID的十六进制值
        type: string
    type: object
  router.DevTypeNameResp:
    properties:
      devTypeName:
        description: DevTypeName 设备类型名称
        type: string
      unit:
        description: Unit 单位
        type: number
    type: object
  router.DevVendorNameResp:
    properties:
      bname:
        description: BName 设备供应商名称
        type: string
    type: object
  router.DevVersion:
    properties:
      build:
        description: Build 构建字符串，包含构建的额外信息
        type: string
      major:
        description: Major 主版本号
        type: integer
      minor:
        description: Minor 次版本号
        type: integer
      patch:
        description: Patch 补丁版本号
        type: integer
    type: object
  router.DevVramVendorResp:
    properties:
      vendorName:
        description: VendorName 显存供应商名称
        type: string
    type: object
  router.DeviceControlInfo:
    properties:
      dvInd:
        description: DvInd 设备索引号
        type: integer
      perfLevel:
        description: PerfLevel 性能水平
        type: string
      resetFan:
        description: ResetFan 是否重置风扇控制
        type: boolean
      sclkClock:
        description: SclkClock sclk时钟频率 600、700、750、800、900、1000、1106、1200、1270、1319、1400、1500、1600
        type: string
      socclkClock:
        description: SocclkClock soclk时钟频率 309、523、566、618、680、755、850、971
        type: string
    type: object
  router.DeviceControlResp:
    properties:
      errors:
        description: Errors 执行失败的错误信息
        items:
          type: string
        type: array
      success:
        description: Success 是否执行成功
        type: boolean
    type: object
  router.DeviceCountInfo:
    properties:
      count:
        description: |-
          Count 设备数量
          example: 4
        type: integer
    type: object
  router.DeviceHealth:
    properties:
      dcu:
        description: DCU DCU编号
        type: integer
      status:
        description: Status 状态
        type: string
      watches:
        description: Watches 检查详情
        items:
          $ref: '#/definitions/router.SystemWatch'
        type: array
    type: object
  router.DeviceInfo:
    properties:
      computeUnit:
        description: ComputeUnit 设备的计算单元数量
        format: float64
        type: number
      devType:
        description: DevType 设备类型
        type: string
      devTypeName:
        description: DevTypeName 设备类型名称
        type: string
      deviceId:
        description: DeviceId 设备ID
        type: string
      dvInd:
        description: DvInd 设备索引
        type: integer
      memoryTotal:
        description: MemoryTotal 设备的内存总量
        format: float64
        type: number
      memoryUsed:
        description: MemoryUsed 设备的已使用内存量
        format: float64
        type: number
      pciBusNumber:
        description: PciBusNumber 设备的总线号
        type: string
    type: object
  router.DeviceInfoResp:
    description: 获取设备信息接口的返回结构
    properties:
      deviceInfo:
        allOf:
        - $ref: '#/definitions/router.DMIDeviceInfo'
        description: DeviceInfo 设备信息
    type: object
  router.DeviceLinkSum:
    properties:
      dvInd:
        description: DvInd 设备索引
        type: integer
      err:
        description: Err 该设备查询过程中的错误信息（成功时为空字符串）
        type: string
      links:
        description: Links 每个 Link 的接收/发送带宽明细
        items:
          $ref: '#/definitions/router.LinkBandwidth'
        type: array
      recv:
        description: Recv 接收方向（direction=0）所有 Link 的带宽总和
        type: number
      send:
        description: Send 发送方向（direction=1）所有 Link 的带宽总和
        type: number
    type: object
  router.DeviceMemVendorInfo:
    properties:
      deviceId:
        description: DeviceID 设备索引号
        type: integer
      vendor:
        description: Vendor 内存供应商信息
        type: string
    type: object
  router.DeviceModelInfo:
    properties:
      cuCount:
        description: CUCount CU 数量
        type: number
      memorySize:
        description: MemorySize 内存大小（单位：MB 或 GB，视实现而定）
        type: number
      model:
        description: Model DCU 类型
        type: string
    type: object
  router.DevicePowerInfo:
    properties:
      deviceId:
        description: DeviceID 设备索引号
        type: integer
      power:
        description: Power 设备功率
        type: integer
    type: object
  router.DevicePowerPlayInfo:
    description: 设备的GPU时钟频率和电压信息
    properties:
      ddcCurve:
        description: DDC_CURVE 电压曲线
        items:
          type: string
        type: array
      deviceId:
        description: DeviceID 设备索引号
        type: integer
      mclk:
        description: MCLK MCLK 时钟值
        type: string
      range:
        description: RANGE 时钟范围
        items:
          type: string
        type: array
      sclk:
        description: SCLK SCLK 时钟列表
        items:
          type: string
        type: array
    type: object
  router.DeviceProductInfo:
    description: 设备的产品信息，包括产品系列、型号、供应商和 SKU
    properties:
      cardModel:
        description: |-
          CardModel 设备型号
          example: "HDCU-1000"
        type: string
      cardSeries:
        description: |-
          CardSeries 设备系列名称
          example: "Hygon DCU"
        type: string
      cardSku:
        description: |-
          CardSKU SKU 信息
          example: "SKU-001"
        type: string
      cardVendor:
        description: |-
          CardVendor 设备供应商
          example: "Sugon"
        type: string
      deviceId:
        description: |-
          DeviceID 设备索引号
          example: 0
        type: integer
    type: object
  router.DeviceProfile:
    description: 设备的电源配置文件信息，包括可用的电源配置选项
    properties:
      deviceId:
        description: |-
          DeviceID 设备索引号
          example: 0
        type: integer
      profiles:
        description: |-
          Profiles 文件信息列表
          example: ["Profile1", "Profile2"]
        items:
          type: string
        type: array
    type: object
  router.DeviceRemainingInfoResp:
    properties:
      cus:
        description: CUs 剩余计算单元数量
        type: integer
      memories:
        description: Memories 剩余内存大小（单位：字节）
        type: integer
    type: object
  router.DeviceSerialInfo:
    description: 设备的序列号信息，包括设备索引号和序列号
    properties:
      deviceId:
        description: |-
          DeviceID 设备索引号
          example: 0
        type: integer
      serialNumber:
        description: |-
          SerialNumber 设备序列号
          example: "SN123456789"
        type: string
    type: object
  router.DeviceStatusInfo:
    properties:
      blocksInfos:
        description: BlocksInfo 设备的block信息
        items:
          $ref: '#/definitions/router.BlocksInfo'
        type: array
      clk:
        description: Clk 设备的当前时钟频率
        format: float64
        type: number
      computeUnitRemainingCount:
        description: ComputeUnitRemainingCount 设备剩余可用的计算单元数量
        format: int64
        type: integer
      dvInd:
        description: DvInd 设备索引
        type: integer
      memoryRemaining:
        description: MemoryRemaining 设备剩余可用的内存量
        format: int64
        type: integer
      memoryUsed:
        description: MemoryUsed 设备已使用的内存
        format: float64
        type: number
      pcieBwMb:
        description: PcieBwMb 设备的PCIe带宽 (MB/s)
        format: float64
        type: number
      pcieReceived:
        description: PcieReceived 设备的PCIe接收数据量
        format: float64
        type: number
      pcieSent:
        description: PcieSent 设备的PCIe发送数据量
        format: float64
        type: number
      percent:
        description: Percent 物理设备使用百分比
        type: integer
      powerUsed:
        description: PowerUsed 设备当前的功耗
        format: float64
        type: number
      temperature:
        description: Temperature 设备当前的温度
        format: float64
        type: number
      utilizationRate:
        description: UtilizationRate 设备时间忙碌百分比
        format: float64
        type: number
    type: object
  router.DeviceUIdInfo:
    description: 设备的唯一ID信息，包括设备索引号和唯一ID
    properties:
      deviceId:
        description: |-
          DeviceID 设备索引号
          example: 0
        type: integer
      uid:
        description: |-
          UId 设备唯一ID
          example: "UID123456789"
        type: string
    type: object
  router.DeviceUmcSum:
    properties:
      dvInd:
        description: DvInd 设备索引（从 0 开始）
        type: integer
      err:
        description: Err 错误信息；成功时为空字符串
        type: string
      read:
        description: Read 所有 UMC channel 的读带宽之和（失败时为 0）
        type: number
      readWrite:
        description: ReadWrite 所有 UMC channel 的读写带宽之和（失败时为 0）
        type: number
      write:
        description: Write 所有 UMC channel 的写带宽之和（失败时为 0）
        type: number
    type: object
  router.DeviceUseInfo:
    properties:
      deviceId:
        description: DeviceID 设备索引号
        type: integer
      gpuUsePercent:
        description: GPUUsePercent GPU 使用率（百分比）
        type: integer
      utilization:
        additionalProperties:
          format: int64
          type: integer
        description: Utilization 各类利用率统计
        type: object
    type: object
  router.DeviceVBIOSInfo:
    description: 设备的VBIOS版本信息，包括设备索引号和VBIOS版本
    properties:
      deviceId:
        description: |-
          DeviceID 设备索引号
          example: 0
        type: integer
      vbios:
        description: |-
          VBIOS 版本信息
          example: "113-C56801-102"
        type: string
    type: object
  router.DeviceVoltageInfo:
    description: 设备的电压信息，包括设备索引号和当前电压
    properties:
      deviceId:
        description: |-
          DeviceID 设备索引号
          example: 0
        type: integer
      voltage:
        description: |-
          Voltage 电压信息
          example: 120
        type: integer
    type: object
  router.DiagResp:
    properties:
      jobId:
        description: JobID 诊断任务 ID
        type: string
      status:
        description: Status 当前任务状态（pending / running）
        type: string
      statusUrl:
        description: StatusURL 查询任务状态的接口地址
        type: string
    type: object
  router.DiagResult:
    properties:
      errorCode:
        description: ErrorCode 错误码
        example: 0
        type: integer
      errorMessage:
        description: ErrorMessage 错误信息
        example: ""
        type: string
      status:
        description: Status 诊断结果状态
        example: PASS
        type: string
      testName:
        description: TestName 测试名称
        example: PCIe Bandwidth Test
        type: string
      testOutput:
        description: TestOutput 测试输出信息
        example: Bandwidth is within expected range
        type: string
    type: object
  router.DiagResults:
    properties:
      deviceNumber:
        description: DeviceNumber 设备数量信息
        example: 8
        type: integer
      perDCU:
        description: PerDCU 每个 DCU 的诊断结果
        items:
          $ref: '#/definitions/router.DCUResult'
        type: array
      software:
        description: Software 软件层诊断结果
        items:
          $ref: '#/definitions/router.DiagResult'
        type: array
    type: object
  router.EccStatusResp:
    properties:
      eccStatus:
        description: EccStatus ECC状态，字符串类型
        type: string
    type: object
  router.EncryptionVMStatusResp:
    properties:
      status:
        description: Status 是否处于加密状态
        type: boolean
    type: object
  router.FailedMessage:
    description: 包含重置clock操作失败时的设备ID和错误信息
    properties:
      errorMsg:
        description: ErrorMsg 错误信息
        type: string
      id:
        description: ID 设备ID
        type: integer
    type: object
  router.FailedResp:
    properties:
      failedMessages:
        description: FailedMessages 包含重置clock操作失败时的设备ID和错误信息
        items:
          $ref: '#/definitions/router.FailedMessage'
        type: array
    type: object
  router.FanSpeedInfoResp:
    properties:
      fanLevel:
        description: FanLevel 风扇转速
        type: integer
      fanPercentage:
        description: FanPercentage 风扇转速占最大转速的百分比
        type: number
    type: object
  router.FanSpeedResp:
    properties:
      speed:
        description: Speed 风扇速度，单位 RPM
        type: integer
    type: object
  router.FirmwareBlock:
    properties:
      blockName:
        description: BlockName 固件块名称
        type: string
      version:
        description: Version 固件版本
        type: string
    type: object
  router.FirmwareInfoResp:
    properties:
      deviceID:
        description: DeviceID 设备索引号
        type: integer
      firmwareVer:
        description: FirmwareVer 固件块列表
        items:
          $ref: '#/definitions/router.FirmwareBlock'
        type: array
    type: object
  router.Frequencies:
    properties:
      current:
        description: Current 表示当前使用的频率
        type: integer
      frequency:
        description: Frequency 表示设备支持的频率列表
        items:
          type: integer
        type: array
      numSupported:
        description: NumSupported 表示设备支持的频率数量
        type: integer
    type: object
  router.GetCoarseGrainUtilReq:
    properties:
      device:
        description: Device 设备 ID
        type: integer
      typeName:
        description: TypeName 利用率计数器类型名称（可选）
        type: string
    type: object
  router.GetCoarseGrainUtilResp:
    properties:
      utilizationCounters:
        description: UtilizationCounters 利用率计数器列表
        items:
          $ref: '#/definitions/router.UtilizationCounter'
        type: array
    type: object
  router.GetDeviceModelInfosResp:
    properties:
      devices:
        description: Devices 设备型号信息列表
        items:
          $ref: '#/definitions/router.DeviceModelInfo'
        type: array
    type: object
  router.GetProcessInfoResp:
    properties:
      processes:
        description: Processes 进程信息列表
        items:
          $ref: '#/definitions/router.Process'
        type: array
    type: object
  router.GetProcessNameResp:
    properties:
      processName:
        description: ProcessName 进程名称
        type: string
    type: object
  router.HealthCheckByGroupReq:
    properties:
      checkHealthConfig:
        description: CheckHealthConfig 是否检查 HealthConfig
        type: boolean
      groupId:
        description: GroupId 设备组ID
        type: integer
    required:
    - groupId
    type: object
  router.HealthCheckByGroupResp:
    properties:
      deviceHealths:
        description: DeviceHealths 设备健康结果列表
        items:
          $ref: '#/definitions/router.DeviceHealth'
        type: array
    type: object
  router.HealthCheckConfig:
    properties:
      enabled:
        description: Enabled 是否开启健康检查
        example: true
        type: boolean
      options:
        description: Options 健康检查项列表
        example:
        - power
        - temperature
        - pcie
        items:
          type: string
        type: array
    type: object
  router.HyLinkStatusByDcuIdResp:
    properties:
      deviceLinkBandwidth:
        allOf:
        - $ref: '#/definitions/router.DeviceLinkSum'
        description: DeviceLinkBandwidth 设备的 HyLink 带宽汇总结果
    type: object
  router.HyUMCStatusResp:
    properties:
      deviceUmcBandwidth:
        description: DeviceUmcBandwidth 所有设备的 UMC 带宽汇总信息列表
        items:
          $ref: '#/definitions/router.DeviceUmcSum'
        type: array
    type: object
  router.Job:
    description: Job represents an asynchronous diagnostic task with its metadata
      and results
    properties:
      endedAt:
        description: |-
          EndedAt 作业结束（成功/失败/取消）的时间戳（零值表示尚未结束）
          example: 2025-12-29T10:30:00Z
        type: string
      errorMessage:
        description: |-
          ErrorMessage 如果作业执行失败或中止，这里保存错误信息或说明
          example: GPU not found
        type: string
      id:
        description: |-
          ID 唯一作业标识符（由服务生成，例如 job-<unixnano>-<seq>）
          example: job-1698493923-01
        type: string
      level:
        description: |-
          Level 要执行的诊断等级（1..4）
          example: 2
        type: integer
      result:
        allOf:
        - $ref: '#/definitions/router.DiagResults'
        description: Result 作业完成后保存的结构化诊断结果
      startedAt:
        description: |-
          StartedAt 作业实际开始执行的时间戳（零值表示尚未开始）
          example: 2025-12-29T10:00:00Z
        type: string
      status:
        description: |-
          Status 作业当前状态
          example: pending
        type: string
    type: object
  router.LinkBandwidth:
    properties:
      linkId:
        description: LinkId Link 索引
        type: integer
      recv:
        description: Recv 接收方向（direction=0）的带宽
        type: number
      send:
        description: Send 发送方向（direction=1）的带宽
        type: number
    type: object
  router.MaxPowerResp:
