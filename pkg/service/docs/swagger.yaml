info:
  contact: {}
paths:
  /AllDeviceInfos:
    get:
      description: 该接口返回所有物理设备的详细信息。
      produces:
      - application/json
      responses:
        "200":
          description: 所有设备的详细信息
          schema:
            items:
              $ref: '#/definitions/router.PhysicalDeviceInfo'
            type: array
        "400":
          description: 无效的请求参数
          schema: {}
        "500":
          description: 服务器内部错误
          schema: {}
      summary: 获取所有物理设备信息
      tags:
      - Device
  /CollectDeviceMetrics:
    get:
      description: 收集所有设备的监控指标信息。
      responses:
        "200":
          description: 设备监控指标信息列表
          schema:
            items:
              $ref: '#/definitions/router.MonitorInfo'
            type: array
        "400":
          description: 请求错误
          schema: {}
        "404":
          description: 设备未找到
          schema: {}
      summary: 获取设备监控中的指标
      tags:
      - Device
  /CreateVDevices:
    post:
      description: 在指定的物理设备上创建指定数量的虚拟设备，返回创建的虚拟设备ID集合
      parameters:
      - description: 物理设备的索引
        in: query
        name: dvInd
        required: true
        type: integer
      - description: 要创建的虚拟设备数量
        in: query
        name: vDevCount
        required: true
        type: integer
      - collectionFormat: csv
        description: 每个虚拟设备的计算单元数量，多个值使用多个 vDevCUs 参数传递，例如：vDevCUs=10&vDevCUs=20
        in: query
        items:
          type: integer
        name: vDevCUs
        required: true
        type: array
      - collectionFormat: csv
        description: 每个虚拟设备的内存大小，多个值使用多个 vDevMemSize 参数传递，例如：vDevMemSize=1024&vDevMemSize=2048
        in: query
        items:
          type: integer
        name: vDevMemSize
        required: true
        type: array
      responses:
        "200":
          description: 虚拟设备创建成功，返回虚拟设备ID集合
          schema:
            $ref: '#/definitions/router.CreateVDevicesResp'
        "400":
          description: 请求参数无效
          schema:
            type: string
        "500":
          description: 创建虚拟设备失败
          schema:
            type: string
      summary: 创建虚拟设备
      tags:
      - VDevice
  /DeleteHealthCheckConfig:
    delete:
      description: 删除当前的健康检查项配置
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            type: string
        "500":
          description: 服务器内部错误
          schema: {}
      summary: 删除健康检查项的配置
      tags:
      - Device
  /DestroySingleVDevice:
    delete:
      description: 销毁指定索引的虚拟设备
      parameters:
      - description: 虚拟设备的索引
        in: query
        name: vDvInd
        required: true
        type: integer
      responses:
        "200":
          description: 虚拟设备销毁成功
          schema:
            type: string
        "400":
          description: 虚拟设备销毁失败
          schema:
            type: string
      summary: 销毁单个虚拟设备
      tags:
      - VDevice
  /DestroyVDevice:
    delete:
      description: 销毁指定物理设备上的所有虚拟设备
